services:
  - type: web
    name: arcovia-ai-sourcing
    runtime: node
    startCommand: node src/server.js
    healthCheckPath: /health
    disk:
      name: arcovia-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ARCOVIA_FLOW_SECRET
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_ADMIN_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_ADMIN_API_VERSION
        value: 2026-04
      - key: ARCOVIA_ADMIN_STATUS_SECRET
        sync: false
      - key: ARCOVIA_DATA_DIR
        value: /var/data
      - key: ARCOVIA_ALLOW_TEMP_PAYMENT_STORAGE
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "12000"
      - key: OPENAI_REASONING_EFFORT
        value: low
      - key: OPENAI_WEB_SEARCH_CONTEXT_SIZE
        value: high
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_PROVIDER
        value: auto
      - key: FROM_EMAIL
        value: Arcovia <updates@arcovia.africa>
      - key: RESEND_TEST_FROM_EMAIL
        value: Arcovia <onboarding@resend.dev>
      - key: REPLY_TO_EMAIL
        value: arcovia.africa@gmail.com
      - key: ADMIN_EMAIL
        value: vutlharingobeni5@gmail.com
      - key: EMAIL_ADMIN_RELAY_ON_FAILURE
        value: "true"
      - key: EMAIL_OUTBOX_COUNTS_AS_SENT
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        value: Arcovia <arcovia.africa@gmail.com>
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_MERCHANT_KEY
        sync: false
      - key: PAYFAST_PASSPHRASE
        sync: false
      - key: PAYFAST_SANDBOX
        value: "true"
      - key: PAYFAST_EMAIL_CONFIRMATION
        value: "false"
      - key: PAYFAST_CONFIRMATION_EMAIL
        value: vutlharingobeni5@gmail.com
      - key: UPDATE_INTERVAL_HOURS
        value: "6"
      - key: MAX_SOURCING_DAYS
        value: "14"
      - key: DEEP_RESEARCH_MAX_ATTEMPTS
        value: "3"
      - key: DEEP_RESEARCH_NO_MATCH_RETRIES
        value: "2"
      - key: DEEP_RESEARCH_CONFIRMATION_CHECKS_AFTER_FOUND
        value: "2"
      - key: RESEARCH_RETRY_DELAY_MINUTES
        value: "5"
      - key: RESEARCH_TECHNICAL_RETRY_DELAY_MINUTES
        value: "15"
      - key: DEEP_RESEARCH_MAX_CANDIDATES
        value: "25"
      - key: LOCAL_CODEX_WORKER_ENABLED
        value: "true"
      - key: LOCAL_CODEX_MULTI_AGENT_ENABLED
        value: "true"
      - key: LOCAL_CODEX_AGENT_CONCURRENCY
        value: "2"
      - key: LOCAL_CODEX_WORKER_LEASE_MINUTES
        value: "90"
      - key: DEPOSIT_SKU
        value: ARC-DEPOSIT-250,ARC-SOURCE-250
